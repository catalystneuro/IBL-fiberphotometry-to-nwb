  experiment_description:
    "This experiment investigates the distinct roles of key neuromodulators—dopamine, serotonin, norepinephrine, and acetylcholine—in shaping decision-making and adaptive behavior.
    Using the International Brain Laboratory's standardized decision-making task, which has been validated for reproducibility across behavior and neural recordings,
    we systematically examine neuromodulatory activity across multiple brain regions and task events.
    This approach allows us to link neuromodulatory dynamics to learning, behavioral strategy shifts, and theoretical models of decision making.
    To support this scientific effort, the project includes the development of integrated hardware for high-throughput fiber photometry acquisition,
    fully compatible with the IBL behavioral platform."
